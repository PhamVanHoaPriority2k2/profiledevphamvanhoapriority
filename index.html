<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --dark-green: #006400;
            --bright-green: #00BC3C;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #111827;
            --info-box-bg: #f8fafc;
            --contact-border: #000000;
        }

        /* Class dành cho chế độ tối */
        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --info-box-bg: #2d2d2d;
            --contact-border: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: 0.3s;
        }

        /* Nút chuyển đổi sáng tối */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--dark-green);
            color: var(--dark-green);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .profile-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid transparent; 
            transition: all 0.4s ease;
            color: var(--text-color);
        }

        .profile-card:hover {
            border-color: var(--dark-green);
            box-shadow: 0 0 30px rgba(0, 100, 0, 0.3);
            transform: translateY(-5px);
        }

        .avatar-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--dark-green);
            padding: 4px;
            margin-bottom: 15px;
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        
        .name-wrapper h2 { margin: 0; font-size: 1.6rem; }

        .job-title {
            color: var(--dark-green);
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .info-container { text-align: left; }

        .info-box {
            background: var(--info-box-bg);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid var(--dark-green);
        }

        .label { font-weight: 600; color: #64748b; font-size: 0.85rem; display: block; margin-bottom: 5px;}
        .value-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        .value { font-weight: 500; }

        /* Style cho nhãn xác thực bạn yêu cầu */
        .verify-tag {
            font-size: 10px;
            font-bold: 700;
            background-color: #f0fdf4; /* xanh lá rất nhạt */
            color: #22c55e; /* text-green-500 */
            padding: 4px 8px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 4px;
            width: fit-content;
        }
        .dark-mode .verify-tag { background-color: #064e3b; color: #4ade80; }

        .social-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }
        .social-bar a img {
            width: 35px;
            height: 35px;
            object-fit: contain;
            transition: 0.3s;
        }
        .social-bar a:hover img { transform: scale(1.2); }

        /* Box liên hệ bo viền nhẹ */
        .contact-box {
            border: 1px solid var(--contact-border);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            opacity: 0.9;
        }

        .highlight-green {
            color: var(--dark-green);
            font-weight: 700;
        }

        .verified-card-link {
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
        }
        .footer-card-img {
            width: 100%;
            max-width: 280px;
            border-radius: 10px;
        }
    </style>
</head>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                btn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }
