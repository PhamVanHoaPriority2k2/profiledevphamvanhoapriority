    <style>
        :root {
            --dark-green: #006400;
            --bright-green: #00BC3C;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid transparent; 
            transition: all 0.4s ease;
        }

        /* Hiệu ứng khung sáng xanh lá cây đậm */
        .profile-card:hover {
            border-color: var(--dark-green);
            box-shadow: 0 0 30px rgba(0, 100, 0, 0.3);
            transform: translateY(-5px);
        }

        .avatar-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--dark-green);
            padding: 4px;
            margin-bottom: 15px;
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        
        .name-wrapper h2 { margin: 0; font-size: 1.6rem; color: #111827; }

        /* FULLSTACK DEVELOPER màu xanh lá cây đậm */
        .job-title {
            color: var(--dark-green);
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .info-container { text-align: left; }

        .info-box {
            background: #f8fafc;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-left: 5px solid var(--dark-green);
        }

        .label { font-weight: 600; color: #64748b; font-size: 0.85rem; }
        .value { font-weight: 500; color: #1f2937; }

        /* Mạng xã hội dùng ảnh tự cung cấp */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }
        .social-bar a img {
            width: 35px; /* Điều chỉnh kích thước icon ảnh tại đây */
            height: 35px;
            object-fit: contain;
            transition: 0.3s;
            filter: grayscale(20%);
        }
        .social-bar a:hover img {
            transform: scale(1.2);
            filter: grayscale(0%);
        }

        .footer-section {
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 0.9rem;
        }

        /* 090 123 4567 và email màu xanh lá cây đậm */
        .highlight-green {
            color: var(--dark-green);
            font-weight: 700;
        }

        /* Ảnh card có thể nhấp vào */
        .verified-card-link {
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
        }
        .verified-card-link:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }
        .footer-card-img {
            width: 100%;
            max-width: 280px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
